name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: wawipassword
          MYSQL_DATABASE: wawidb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn -B --no-transfer-progress clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-management-system
          path: target/warehouse-management-system-*-jar-with-dependencies.jar
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: warehouse-management-system

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: warehouse-management-system-*-jar-with-dependencies.jar
          body: |
            Initial archived release (${{ github.ref_name }}) of Warehouse Management System (WAWI), an academic project preserved for reference. See the README for documentation.

            **Full Changelog**: https://github.com/mtorun0x7cd/warehouse-management-system/commits/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
