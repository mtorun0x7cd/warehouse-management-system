title = "mtorun0x7cd repository secret-scan policy"

# Baseline: gitleaks' default rule set.
[extend]
useDefault = true

[allowlist]
description = "Documented placeholders and the disclosed educational demo credential (wawipassword) in this archived coursework; see SECURITY.md."
regexTarget = "match"
regexes = [
  '''<[a-z0-9._-]*(password|secret|key|token|username)[a-z0-9._-]*>''',
  '''wawipassword''',
]
