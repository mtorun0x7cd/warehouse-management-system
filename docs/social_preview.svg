<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <!-- Filter for glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow class="glow-shadow" dx="0" dy="0" stdDeviation="12" flood-color="#d97706" flood-opacity="0.05"/>
        </filter>
    </defs>

    <style>
        :root {
            --text-title: #0f172a;
            --text-subtitle: #475569;
            --text-badge: #475569;
            --accent-color: #d97706;
            --accent-badge-text: #b45309;
            --badge-border: #cbd5e1;
            --glow-opacity: 0.05;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-title: #ffffff;
                --text-subtitle: #a0aec0;
                --text-badge: #718096;
                --accent-color: #ED8B00;
                --accent-badge-text: #ffb042;
                --badge-border: #2C3E50;
                --glow-opacity: 0.25;
            }
        }
        .bg-border {
            stroke: var(--accent-color);
            stroke-opacity: 0.15;
        }
        .icon-group {
            stroke: var(--accent-color);
        }
        .icon-box-secondary {
            stroke: var(--badge-border);
        }
        .text-title {
            fill: var(--text-title);
        }
        .text-subtitle {
            fill: var(--text-subtitle);
        }
        .text-badge-dev {
            fill: var(--accent-badge-text);
        }
        .text-badge-gh {
            fill: var(--text-badge);
        }
        .badge-rect-dev {
            fill: var(--accent-color);
            fill-opacity: 0.12;
            stroke: var(--accent-color);
            stroke-opacity: 0.3;
        }
        .badge-rect-gh {
            stroke: var(--badge-border);
        }
        .divider {
            stroke: var(--accent-color);
        }
        .glow-shadow {
            flood-color: var(--accent-color);
            flood-opacity: var(--glow-opacity);
        }
    </style>

    <!-- Outer border/frame -->
    <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" class="bg-border" stroke-width="2"/>

    <!-- Centered Isometric boxes icon -->
    <g transform="translate(312, -162) scale(1.2)" filter="url(#glow)">
        <!-- Box 1 (Primary Accent) -->
        <path d="M 210 220 L 280 185 L 350 220 L 280 255 Z" fill="none" class="icon-group" stroke-width="6" stroke-linejoin="round"/>
        <path d="M 210 220 L 210 295 L 280 330 L 280 255 Z" fill="none" class="icon-group" stroke-width="6" stroke-linejoin="round"/>
        <path d="M 350 220 L 350 295 L 280 330 L 280 255 Z" fill="none" class="icon-group" stroke-width="6" stroke-linejoin="round"/>
        <!-- Box 2 (Secondary Accent) -->
        <path d="M 130 280 L 190 250 L 250 280 L 190 310 Z" fill="none" class="icon-box-secondary" stroke-width="4" stroke-linejoin="round"/>
        <path d="M 130 280 L 130 340 L 190 370 L 190 310 Z" fill="none" class="icon-box-secondary" stroke-width="4" stroke-linejoin="round"/>
        <path d="M 250 280 L 250 340 L 190 370 L 190 310 Z" fill="none" class="icon-box-secondary" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <!-- Centered information block (Text) -->
    <g transform="translate(600, 330)">
        <!-- Project Title -->
        <text x="0" y="30" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="1.2" class="text-title" text-anchor="middle">WAREHOUSE MANAGEMENT SYSTEM</text>
        
        <!-- Center-aligned Divider line -->
        <line x1="-200" y1="65" x2="200" y2="65" class="divider" stroke-width="3" stroke-linecap="round"/>
        
        <!-- Tagline / Subtitle -->
        <text x="0" y="110" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" font-weight="500" class="text-subtitle" letter-spacing="0.5" text-anchor="middle">MySQL-Backed Java Swing Desktop Warehouse Client</text>

        <!-- Technical Domain Badge (centered on left side of group) -->
        <g transform="translate(-187.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" class="badge-rect-dev" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-dev" text-anchor="middle" letter-spacing="1">ACADEMIC ARCHIVE</text>
        </g>

        <!-- GitHub Handle Badge (centered on right side of group) -->
        <g transform="translate(7.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" fill="none" class="badge-rect-gh" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-gh" text-anchor="middle" letter-spacing="1">@mtorun0x7cd</text>
        </g>
    </g>
</svg>